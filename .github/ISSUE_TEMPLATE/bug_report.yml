name: Bug Report
description: Report a bug or unexpected behavior in DexSprint
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: DexSprint Version
      description: Which version of DexSprint are you using? (visible in the app footer)
      placeholder: e.g. 2.0.3
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser
      description: Which browser (and version) are you using?
      placeholder: e.g. Chrome 124, Firefox 125, Safari 17
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device
      description: What device are you using?
      placeholder: e.g. Desktop (Windows 11), iPhone 15, Samsung Galaxy S23
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Screenshots or console errors are welcome.
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, logs, or screenshots that might help.
    validations:
      required: false
